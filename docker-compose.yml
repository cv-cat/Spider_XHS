services:
  xhs-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_CHINA_MIRRORS: ${ENABLE_CHINA_MIRRORS:-1}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: spider-xhs-web:local
    container_name: spider-xhs-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      XHS_WEB_HOST: 0.0.0.0
      XHS_WEB_PORT: 8000
      XHS_USE_PROXY: "0"
    volumes:
      - ./datas:/app/datas
